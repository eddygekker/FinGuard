<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="FinGuard logo">
  <defs>
    <linearGradient id="fg-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="fg-shine" x1="20" y1="18" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="fg-chart" x1="22" y1="38" x2="42" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Shield base -->
  <path
    d="M32 5L10 14v14.5c0 12.2 8.4 23.6 22 27.5 13.6-3.9 22-15.3 22-27.5V14L32 5z"
    fill="url(#fg-bg)"
  />
  <path
    d="M32 8.5L13.5 16.2v12.3c0 10.2 7.1 19.8 18.5 23.2 11.4-3.4 18.5-13 18.5-23.2V16.2L32 8.5z"
    fill="url(#fg-shine)"
  />

  <!-- Analytics bars inside shield -->
  <rect x="22" y="34" width="5" height="10" rx="1.5" fill="url(#fg-chart)" opacity="0.9"/>
  <rect x="29.5" y="28" width="5" height="16" rx="1.5" fill="url(#fg-chart)"/>
  <rect x="37" y="22" width="5" height="22" rx="1.5" fill="url(#fg-chart)"/>

  <!-- AI neural nodes + connections -->
  <circle cx="44" cy="18" r="3" fill="#fff"/>
  <circle cx="50" cy="24" r="2.2" fill="#c4b5fd"/>
  <circle cx="46" cy="27" r="2" fill="#67e8f9"/>
  <path d="M44 18l6 6M44 21l2 6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>

  <!-- Spark = AI insight -->
  <path
    d="M18 17l1.2 4.8L24 23l-4.8 1.2L18 29l-1.2-4.8L12 23l4.8-1.2L18 17z"
    fill="#fff"
    opacity="0.92"
  />
</svg>
